# IRT Parameters for ABC Assessment
# Reference: abc-assessment-spec Section 11.1
#
# Model: Samejima's Graded Response Model (GRM)
# Estimation method: Expected A Posteriori (EAP) via Gaussian quadrature
# Library: custom implementation (numpy/scipy)
#
# Status: SYNTHETIC
# Warning: These parameters are generated from simulation, not estimated
# from empirical data. Replace with empirically calibrated parameters
# before clinical use.

model: graded_response
estimation_method: eap
data_source: synthetic

generation_parameters:
  n_items: 24
  n_categories: 7
  discrimination_range: [0.8, 2.5]
  difficulty_range: [-2.5, 2.5]
  min_threshold_spacing: 0.3
  seed: 42

factor_structure:
  a_sat:
    items: [AS1, AS2, AS3, AS4]
    indices: [0, 1, 2, 3]
  a_frust:
    items: [AF1, AF2, AF3, AF4]
    indices: [4, 5, 6, 7]
  b_sat:
    items: [BS1, BS2, BS3, BS4]
    indices: [8, 9, 10, 11]
  b_frust:
    items: [BF1, BF2, BF3, BF4]
    indices: [12, 13, 14, 15]
  c_sat:
    items: [CS1, CS2, CS3, CS4]
    indices: [16, 17, 18, 19]
  c_frust:
    items: [CF1, CF2, CF3, CF4]
    indices: [20, 21, 22, 23]

scoring:
  prior_mean: 0.0
  prior_sd: 1.0
  quadrature_points: 61
  theta_to_subscale:
    center: 5.0
    scale: 2.5
    clamp_min: 0.0
    clamp_max: 10.0
