# Status: SYNTHETIC
# Warning: These thresholds are derived from simulated criterion data,
# not from empirical criterion-validated assessments. Replace with
# empirically derived thresholds before clinical use.
#
# Method: ROC analysis with Youden's J statistic
# Criterion: Simulated burnout inventory scores correlated with ABC frustration
# Bootstrap: 2000 resamples for 95% CI

